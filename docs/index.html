<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Russell 1000 · 美股异动日报</title>
<style>
  body{background:#080b0f;color:#d4dde8;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
  .box{text-align:center;padding:40px;}
  .logo{font-family:monospace;font-size:16px;color:#00e5a0;letter-spacing:3px;margin-bottom:16px;}
  h1{font-size:22px;font-weight:600;margin:0 0 8px;}
  p{color:#5a6a7a;font-size:14px;}
  .dot{display:inline-block;width:8px;height:8px;background:#ffb830;border-radius:50%;margin-right:8px;animation:b 1.5s infinite;}
  @keyframes b{0%,100%{opacity:1}50%{opacity:.2}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">MKTSCAN · RUSSELL 1000</div>
  <h1>美股异动日报</h1>
  <p><span class="dot"></span>每个交易日盘后自动更新，请稍后访问</p>
  <p style="margin-top:8px;font-size:12px;">首次报告将在下一个交易日收盘后（美东 22:00）自动生成</p>
</div>
</body>
</html>
